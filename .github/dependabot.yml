version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    commit-message:
      prefix: requirements
    reviewers:
      - "ukanga"
      - "KipSigei"
      - "DavisRayM"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    reviewers:
      - "ukanga"
      - "KipSigei"
      - "DavisRayM"
