<p class="card-title">Components — Buttons</p><p class="card-sub">Actions built from the brand palette, with accessible contrast.</p>
<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:22px">
  <button style="display:inline-flex;align-items:center;justify-content:center;font-family:inherit;font-size:15px;font-weight:700;padding:11px 22px;border-radius:8px;border:2px solid transparent;cursor:pointer;letter-spacing:.01em;background:#00AEEF;color:#0a1417">Primary action</button>
  <button style="display:inline-flex;align-items:center;justify-content:center;font-family:inherit;font-size:15px;font-weight:700;padding:11px 22px;border-radius:8px;border:2px solid transparent;cursor:pointer;letter-spacing:.01em;background:transparent;border-color:#00AEEF;color:#0047BB">Secondary</button>
  <button style="display:inline-flex;align-items:center;justify-content:center;font-family:inherit;font-size:15px;font-weight:700;padding:11px 22px;border-radius:8px;border:2px solid transparent;cursor:pointer;letter-spacing:.01em;background:transparent;color:#0047BB">Ghost</button>
  <button style="display:inline-flex;align-items:center;justify-content:center;font-family:inherit;font-size:15px;font-weight:700;padding:11px 22px;border-radius:8px;border:2px solid transparent;cursor:pointer;letter-spacing:.01em;background:#d9e6ec;color:#5b6c73;cursor:not-allowed">Disabled</button>
</div>
<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center">
  <button style="display:inline-flex;align-items:center;justify-content:center;font-family:inherit;font-size:15px;font-weight:700;padding:11px 22px;border-radius:8px;border:2px solid transparent;cursor:pointer;letter-spacing:.01em;background:#0047BB;color:#fff">On dark ground</button>
  <button style="display:inline-flex;align-items:center;justify-content:center;font-family:inherit;font-size:15px;font-weight:700;padding:11px 22px;border-radius:8px;border:2px solid transparent;cursor:pointer;letter-spacing:.01em;background:#004C45;color:#fff">Confirm</button>
</div>
<div style="margin-top:20px;padding:12px 15px;border-radius:10px;background:#eef6f9;border-left:4px solid #FF8200;font-size:12.5px;color:#0a1417">

</div>
